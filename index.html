<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>축구 투표 시스템</title>
    <style>
        body { font-family: 'Noto Sans KR', sans-serif; background-color: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: white; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 100%; max-width: 450px; text-align: center; position: relative; overflow: hidden; }
        h2 { color: #333; margin-bottom: 1.5rem; }
        .input-group { text-align: left; margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: #555; font-size: 0.95rem; }
        input[type="text"], input[type="number"] { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 8px; box-sizing: border-box; font-size: 1rem; transition: border-color 0.3s; }
        input:focus { border-color: #4CAF50; outline: none; }
        .btn { width: 100%; padding: 12px; border: none; border-radius: 8px; font-size: 1rem; cursor: pointer; margin-top: 1rem; font-weight: bold; transition: opacity 0.2s; }
        .btn:hover { opacity: 0.9; }
        .btn-enter { background-color: #4CAF50; color: white; }
        .btn-vote { background-color: #2196F3; color: white; }
        .btn-back { background-color: #9e9e9e; color: white; font-size: 0.85rem; padding: 8px; margin-top: 0.5rem; text-decoration: none; display: inline-block; width: auto; border-radius: 5px; }
        .btn-reset { background-color: #f44336; color: white; font-size: 0.85rem; padding: 8px; margin-top: 0.5rem; }
        .hidden { display: none !important; }
        .score-box { background: #f8f9fa; padding: 15px; border-radius: 8px; margin: 1rem 0; border: 1px solid #eee; }
        .score-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; font-size: 0.95rem; }
        .score-input { width: 80px; text-align: center; padding: 8px; border: 1px solid #ccc; border-radius: 4px; }
        .radio-group { display: flex; gap: 10px; margin-bottom: 1rem; justify-content: center; }
        .radio-label { cursor: pointer; font-weight: normal; color: #333; }
        #alertBox { padding: 12px; border-radius: 8px; margin-bottom: 1rem; font-weight: bold; display: none; animation: fadeIn 0.3s; text-align: left; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        .alert-error { background-color: #ffebee; color: #c62828; border: 1px solid #ef9a9a; }
        .alert-success { background-color: #e8f5e9; color: #2e7d32; border: 1px solid #a5d6a7; }
        .stats-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 10px; margin-bottom: 1.5rem; text-align: left; }
        .stat-card { background: #f0f4f8; padding: 15px; border-radius: 8px; border-left: 4px solid #2196F3; }
        .stat-title { font-size: 0.85rem; color: #666; margin-bottom: 5px; }
        .stat-value { font-size: 1.4rem; font-weight: bold; color: #333; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; margin-top: 1rem; }
        th, td { padding: 10px; text-align: left; border-bottom: 1px solid #eee; }
        th { color: #555; background: #fafafa; }
        tr:hover { background-color: #f9f9f9; }
        #resultArea { margin-top: 1rem; display: none; }
        #resultText { color: #2e7d32; font-weight: bold; line-height: 1.5; }
    </style>
</head>
<body>

<div class="card">
    <h2>⚽ 축구 결과 투표</h2>

    <div id="loginSection">
        <div class="input-group">
            <label for="userName">이름을 입력하세요</label>
            <input type="text" id="userName" placeholder="예: 홍길동 또는 ADMIN">
        </div>
        <button class="btn btn-enter" onclick="handleLogin()">입장하기</button>
    </div>

    <div id="alertBox"></div>

    <div id="voteSection" class="hidden">
        <button class="btn btn-back" onclick="goBackUp()">← 이름 입력으로 돌아가기</button>

        <div class="form-group">
            <label>홈팀</label>
            <input type="text" value="1 팀 (대한민국)" readonly style="background:#f5f5f5; color:#666; cursor:not-allowed;">
        </div>
        <div class="form-group">
            <label>원정팀</label>
            <input type="text" value="2 팀 (체코)" readonly style="background:#f5f5f5; color:#666; cursor:not-allowed;">
        </div>

        <div class="form-group">
            <label>경기 결과</label>
            <div class="radio-group">
                <label class="radio-label"><input type="radio" name="result" value="home" checked onchange="handleResultChange()"> 1 팀 승</label>
                <label class="radio-label"><input type="radio" name="result" value="draw" onchange="handleResultChange()"> 무승부</label>
                <label class="radio-label"><input type="radio" name="result" value="away" onchange="handleResultChange()"> 2 팀 승</label>
            </div>
        </div>

        <div class="score-box">
            <div class="form-group">
                <label>1 팀 득점</label>
                <input type="number" id="team1Score" class="score-input" min="0" value="0" oninput="validateScores()">
            </div>
            <div class="form-group">
                <label>2 팀 득점</label>
                <input type="number" id="team2Score" class="score-input" min="0" value="0" oninput="validateScores()">
            </div>
        </div>

        <button class="btn btn-vote" onclick="submitVote()">투표 제출하기</button>
        <div id="resultArea">
            <div id="resultText"></div>
        </div>
    </div>

    <div id="adminSection" class="hidden">
        <button class="btn btn-back" onclick="goBackUp()">← 이름 입력으로 돌아가기</button>
        <h2 style="color: #2196F3;">📊 투표 현황 (ADMIN)</h2>
        <p style="font-size: 0.9rem; color: #666; margin-bottom: 1rem;">총 투표 수: <b id="totalCount">0</b> 표</p>

        <div class="stats-grid">
            <div class="stat-card">
                <div class="stat-title">1 팀 (대한민국) 승</div>
                <div class="stat-value" id="countHome">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">무승부</div>
                <div class="stat-value" id="countDraw">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">2 팀 (체코) 승</div>
                <div class="stat-value" id="countAway">0</div>
            </div>
            <div class="stat-card">
                <div class="stat-title">평균 총 득점</div>
                <div class="stat-value" id="avgScore">0.0</div>
            </div>
        </div>

        <table>
            <thead>
                <tr>
                    <th>이름</th>
                    <th>결과</th>
                    <th>점수 (1 팀 - 2 팀)</th>
                    <th>시간</th>
                </tr>
            </thead>
            <tbody id="adminTableBody">
            </tbody>
        </table>
        <button class="btn btn-reset" onclick="resetData()">데이터 초기화</button>
    </div>
</div>

<script>
    // [중요] Vercel 에 배포된 API 엔드포인트 URL 로 변경해야 합니다.
    // 로컬 개발 시에는 http://localhost:3000/api/votes
    // 배포 후에는 https://your-app-name.vercel.app/api/votes
    const API_URL = window.location.origin + 'https://ssss-h94op3alt-nabo-s-projects.vercel.app/api/votes'; 
    let votes = [];
    let isAdminMode = false;

    const loginSection = document.getElementById('loginSection');
    const voteSection = document.getElementById('voteSection');
    const adminSection = document.getElementById('adminSection');
    const alertBox = document.getElementById('alertBox');
    const userNameInput = document.getElementById('userName');

    // 페이지 로드 시 데이터 가져오기
    async function loadVotes() {
        try {
            const response = await fetch(API_URL, { method: 'GET' });
            const data = await response.json();

            if (!response.ok) throw new Error(data.error || '서버 오류');

            // 데이터 구조 매핑 (Supabase 컬럼명 -> 기존 코드 변수명)
            // score_home -> scoreHome, score_away -> scoreAway
            votes = Array.isArray(data) ? data.map(item => ({
                ...item,
                scoreHome: item.score_home,
                scoreAway: item.score_away
            })) : [];

            if (isAdminMode) {
                renderAdminDashboard();
            }
        } catch (err) {
            console.error("데이터 로드 실패:", err);
            showAlert("데이터를 불러오는데 실패했습니다.", "error");
        }
    }

    document.addEventListener('DOMContentLoaded', () => {
        userNameInput.addEventListener("keypress", function(event) {
            if (event.key === "Enter") handleLogin();
        });
        loadVotes();
    });

    function showAlert(msg, type) {
        alertBox.textContent = msg;
        alertBox.className = `alertBox alert-${type}`;
        alertBox.style.display = 'block';
        setTimeout(() => {
            alertBox.style.display = 'none';
        }, 5000);
    }

    function goBackUp() {
        isAdminMode = false;
        loginSection.classList.remove('hidden');
        voteSection.classList.add('hidden');
        adminSection.classList.add('hidden');
        userNameInput.value = '';
        userNameInput.focus();
    }

    function handleLogin() {
        const name = userNameInput.value.trim();
        if (!name) {
            showAlert("이름을 입력해주세요.", "error");
            return;
        }

        const isAdmin = (name.toUpperCase() === 'ADMIN');

        // 중복 체크 (관리자 제외)
        const isDuplicate = votes.some(v => v.name === name && !v.isAdmin);

        if (isAdmin) {
            isAdminMode = true;
            loginSection.classList.add('hidden');
            voteSection.classList.add('hidden');
            adminSection.classList.remove('hidden');
            showAlert("관리자 모드로 진입했습니다.", "success");
            loadVotes(); // 관리자 모드일 때 데이터 다시 로드
        } else if (isDuplicate) {
            showAlert("이미 투표하신 이름입니다. 중복 투표는 불가능합니다.", "error");
            userNameInput.value = '';
            userNameInput.focus();
        } else {
            isAdminMode = false;
            loginSection.classList.add('hidden');
            voteSection.classList.remove('hidden');
            adminSection.classList.add('hidden');
            showAlert(`${name}님 환영합니다! 투표해주세요.`, "success");
            document.getElementById('team1Score').value = 0;
            document.getElementById('team2Score').value = 0;
        }
    }

    function handleResultChange() {
        const result = document.querySelector('input[name="result"]:checked').value;
        const t1Input = document.getElementById('team1Score');
        const t2Input = document.getElementById('team2Score');

        if (result === 'home') {
            t1Input.value = 1;
            t2Input.value = 0;
        } else if (result === 'away') {
            t1Input.value = 0;
            t2Input.value = 1;
        } else {
            t1Input.value = 0;
            t2Input.value = 0;
        }
        validateScores(true);
    }

    function validateScores(showSuccess = false) {
        const result = document.querySelector('input[name="result"]:checked').value;
        const t1 = parseInt(document.getElementById('team1Score').value) || 0;
        const t2 = parseInt(document.getElementById('team2Score').value) || 0;
        const isAlertBoxVisible = alertBox.style.display === 'block';

        let isValid = true;
        let message = "";

        if (result === 'home') {
            if (t1 <= t2) {
                isValid = false;
                message = "1 팀 승을 선택하셨습니다. 1 팀의 득점이 2 팀보다 높아야 합니다.";
            }
        } else if (result === 'away') {
            if (t2 <= t1) {
                isValid = false;
                message = "2 팀 승을 선택하셨습니다. 2 팀의 득점이 1 팀보다 높아야 합니다.";
            }
        } else if (result === 'draw') {
            if (t1 !== t2) {
                isValid = false;
                message = "무승부를 선택하셨습니다. 두 팀의 득점이 동일해야 합니다.";
            }
        }

        if (!isValid) {
            if (!isAlertBoxVisible) showAlert(message, "error");
            return false;
        } else {
            if (isAlertBoxVisible) alertBox.style.display = 'none';
            return true;
        }
    }

    async function submitVote() {
        if (!validateScores()) return;

        const name = userNameInput.value.trim();
        const result = document.querySelector('input[name="result"]:checked').value;
        const t1 = parseInt(document.getElementById('team1Score').value) || 0;
        const t2 = parseInt(document.getElementById('team2Score').value) || 0;

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ name, team: result, scoreHome: t1, scoreAway: t2 })
            });

            const data = await response.json();

            if (!response.ok || data.error) {
                throw new Error(data.error || '서버 오류 발생');
            }

            showAlert("투표가 완료되었습니다!", "success");

            // 성공 후 초기화
            loginSection.classList.remove('hidden');
            voteSection.classList.add('hidden');
            userNameInput.value = '';

            // 데이터 새로고침
            loadVotes();

        } catch (err) {
            showAlert("투표 실패: " + err.message, "error");
        }
    }

    function renderAdminDashboard() {
        const total = votes.length;
        const homeWins = votes.filter(v => v.team === 'home').length;
        const draws = votes.filter(v => v.team === 'draw').length;
        const awayWins = votes.filter(v => v.team === 'away').length;

        const allScores = votes.map(v => (parseInt(v.scoreHome) || 0) + (parseInt(v.scoreAway) || 0));
        const avg = allScores.length > 0 
            ? (allScores.reduce((a, b) => a + b, 0) / allScores.length).toFixed(1) 
            : 0;

        document.getElementById('totalCount').textContent = total;
        document.getElementById('countHome').textContent = homeWins;
        document.getElementById('countDraw').textContent = draws;
        document.getElementById('countAway').textContent = awayWins;
        document.getElementById('avgScore').textContent = avg;

        const tbody = document.getElementById('adminTableBody');
        tbody.innerHTML = '';

        const sortedVotes = [...votes].sort((a, b) => new Date(b.created_at) - new Date(a.created_at));

        sortedVotes.forEach(vote => {
            const row = document.createElement('tr');
            const timeStr = new Date(vote.created_at).toLocaleString();

            let teamText = '';
            if(vote.team === 'home') teamText = '1 팀 승';
            else if(vote.team === 'away') teamText = '2 팀 승';
            else teamText = '무승부';

            row.innerHTML = `
                <td>${vote.name}</td>
                <td>${teamText}</td>
                <td>${vote.scoreHome} - ${vote.scoreAway}</td>
                <td>${timeStr}</td>
            `;
            tbody.appendChild(row);
        });
    }

    function resetData() {
        if(!confirm("정말로 모든 투표 데이터를 삭제하시겠습니까?")) return;
        alert("데이터 초기화는 별도 API 구현이 필요합니다. 현재는 새로고침만 됩니다.");
        location.reload();
    }
</script>
</body>
</html>
